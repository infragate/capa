name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        bun-version: [latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      
      - name: Install dependencies
        run: bun install
      
      - name: Build web UI
        run: bun run build:web
      
      - name: Run tests
        run: bun test
      
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: bun test --coverage
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build web UI (for type check)
        run: bun run build:web

      - name: Check TypeScript types
        run: bunx tsc --noEmit

      - name: Check web UI TypeScript types
        run: bunx tsc --noEmit -p web-ui/tsconfig.json
