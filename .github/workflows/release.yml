name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64
            artifact_name: capa
            asset_name: capa-x86_64-unknown-linux-gnu
          
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bun_target: bun-linux-arm64
            artifact_name: capa
            asset_name: capa-aarch64-unknown-linux-gnu
          
          # macOS x86_64 (Intel) — cross-compiled via --target on Apple Silicon runners
          - os: macos-latest
            target: x86_64-apple-darwin
            bun_target: bun-darwin-x64
            artifact_name: capa
            asset_name: capa-x86_64-apple-darwin
          
          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
            artifact_name: capa
            asset_name: capa-aarch64-apple-darwin
          
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bun_target: bun-windows-x64
            artifact_name: capa.exe
            asset_name: capa-x86_64-pc-windows-msvc.exe

          # Windows aarch64 (ARM64)
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bun_target: bun-windows-arm64
            artifact_name: capa.exe
            asset_name: capa-aarch64-pc-windows-msvc.exe

          # install.ps1 also maps x86 -> i686-pc-windows-msvc, but bun build --compile
          # has no bun-windows-i686 target; 32-bit Windows installs remain unsupported.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate version from tag
        run: bun run scripts/generate-version.ts
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Update install scripts version
        run: bun run scripts/update-install-scripts.ts
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Build web UI
        run: bun run build:web

      - name: Build
        env:
          BUN_TARGET: ${{ matrix.bun_target }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            bun build src/cli/index.ts --compile --target=$BUN_TARGET --windows-icon=./logo.ico --outfile dist/capa
          else
            bun build src/cli/index.ts --compile --target=$BUN_TARGET --outfile dist/capa --icon logo.ico
          fi
        shell: bash

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          if [ -f "capa.exe" ]; then
            mv capa.exe ../capa-${{ matrix.target }}.exe
          else
            mv capa ../capa-${{ matrix.target }}
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ARTIFACT="capa-${{ matrix.target }}.exe"
            HASH=$(powershell -Command "(Get-FileHash '$ARTIFACT' -Algorithm SHA256).Hash.ToLower()")
            echo "$HASH  $ARTIFACT" > "${ARTIFACT}.sha256"
          elif command -v sha256sum >/dev/null 2>&1; then
            ARTIFACT="capa-${{ matrix.target }}"
            sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"
          else
            ARTIFACT="capa-${{ matrix.target }}"
            shasum -a 256 "$ARTIFACT" > "${ARTIFACT}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: capa-${{ matrix.target }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate SHA256SUMS.txt
        run: |
          find artifacts -name '*.sha256' -type f -exec cat {} \; | LC_ALL=C sort -k2 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
            SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload install scripts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            install.sh
            install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
